<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auguri Direttò</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="confetti-canvas" aria-hidden="true"></canvas>

    <header class="app-header">
      <h1>Tanti auguri Fra, ti vogliamo bene ❤️</h1>
    </header>

    <main class="app-main">
      <section class="content-card">
        <div id="media-container" class="media-shell fade-in" aria-live="polite"></div>

        <div class="phrase-block fade-in" id="phrase-block" aria-live="polite">
          <p class="phrase-label">La frase del giorno e:</p>
          <p id="phrase-text" class="phrase-text"></p>
        </div>

        <button id="next-button" class="next-button" type="button" aria-label="Mostra contenuto successivo">
          <span aria-hidden="true">→</span>
        </button>
      </section>
    </main>

    <script src="./frasi.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
